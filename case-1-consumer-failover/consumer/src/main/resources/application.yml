server:
  port: 8080

spring:
  application:
    name: case1-consumer

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: order-processing-group   # Все инстансы консьюмера — одна группа
      auto-offset-reset: earliest        # При старте читать с начала (если нет оффсета)
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # JSON десериализуется в типизированный OrderEvent
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      enable-auto-commit: true
      auto-commit-interval: 1000
      properties:
        # Продюсер не присылает заголовок с типом — указываем целевой тип явно
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.kafka.demo.case1.consumer.model.OrderEvent
        spring.json.trusted.packages: "com.kafka.demo.*"
        # Таймаут heartbeat — через этот интервал Kafka поймёт, что консьюмер умер
        heartbeat.interval.ms: 3000
        session.timeout.ms: 10000
        max.poll.interval.ms: 30000

app:
  consumer-instance-id: ${CONSUMER_INSTANCE_ID:consumer-1}
  chaos:
    # Доля сообщений, на которых имитируется временный сбой обработки (0.0..1.0)
    failure-rate: ${APP_CHAOS_FAILURE_RATE:0.0}
