server:
  port: 8080

spring:
  application:
    name: case1-analytics-service

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      # Отдельная группа — аналитика читает топик независимо от order-processing-group
      group-id: order-analytics-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.kafka.demo.case1.analytics.model.OrderEvent
        spring.json.trusted.packages: "com.kafka.demo.*"
