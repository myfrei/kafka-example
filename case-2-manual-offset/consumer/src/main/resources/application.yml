server:
  port: 8080

spring:
  application:
    name: case2-consumer

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/kafka_demo}
    username: ${SPRING_DATASOURCE_USERNAME:kafka_user}
    password: ${SPRING_DATASOURCE_PASSWORD:kafka_pass}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.postgresql.Driver}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}   # Схема создаётся через init-db.sql
    show-sql: false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

app:
  chaos:
    # Доля сообщений, на которых имитируется сбой обработки (0.0..1.0)
    failure-rate: ${APP_CHAOS_FAILURE_RATE:0.0}
