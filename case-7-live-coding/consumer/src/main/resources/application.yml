server:
  port: 8080

spring:
  application:
    name: case7-consumer

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: payment-retry-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.kafka.demo.case7.consumer.model.PaymentEvent
        spring.json.trusted.packages: "com.kafka.demo.*"
    # Продюсер нужен инфраструктуре retry-топиков: именно через него Spring Kafka
    # публикует упавшие сообщения в *-retry-* и *-dlt топики. [ГОТОВО]
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

app:
  chaos:
    # Доля платежей со случайным ВРЕМЕННЫМ (повторяемым) сбоем.
    # В тестах = 0.0 (детерминизм). В docker-compose выставьте, например, 0.3.
    failure-rate: ${APP_CHAOS_FAILURE_RATE:0.0}
