server:
  port: 8080

spring:
  application:
    name: case4-partition-service

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      # Все 3 инстанса — одна group. Kafka назначит каждому свою партицию.
      group-id: partition-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.kafka.demo.case4.service.model.ActivityEvent
        spring.json.trusted.packages: "com.kafka.demo.*"

app:
  instance-id: ${INSTANCE_ID:instance-1}
  chaos:
    failure-rate: ${APP_CHAOS_FAILURE_RATE:0.0}
